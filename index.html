<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>THE FROSTHOLD DEPTHS</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%2305050a'/%3E%3Ctext x='2' y='12' font-size='10' fill='%236ee7ff'%3E%E2%9D%84%3C/text%3E%3C/svg%3E" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #05050a; color: #cfead6;
    font-family: 'Courier New', monospace;
  }
  #app {
    display: grid;
    grid-template-columns: 1fr 260px;
    grid-template-rows: auto auto 1fr;
    gap: 8px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 10px;
  }
  #title {
    grid-column: 1 / 3;
    text-align: center;
    letter-spacing: 4px;
    color: #6ee7ff;
    text-shadow: 0 0 8px #2a9fbf;
    font-size: 22px;
    margin: 4px 0;
  }
  #viewport-frame {
    position: relative;
    border: 6px solid #23303a;
    border-radius: 10px;
    background: #000;
    box-shadow: inset 0 0 40px #000, 0 0 20px rgba(80,200,255,0.15);
    overflow: hidden;
  }
  #viewport-frame::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.15) 3px);
    pointer-events: none;
  }
  canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }
  #automap { position: absolute; top: 8px; right: 8px; width: 40%; border: 2px solid #3ad6ff; }
  #hud {
    grid-column: 1 / 3;
    background: #10141a;
    border: 1px solid #2a3a44;
    padding: 6px 10px;
    color: #ffd23a;
    letter-spacing: 1px;
  }
  #roster {
    background: #0d1116;
    border: 1px solid #2a3a44;
    padding: 8px;
    font-size: 12px;
    overflow-y: auto;
  }
  .hero { border-bottom: 1px solid #1c2731; padding: 4px 0; }
  .hero.dead { color: #7a4444; text-decoration: line-through; }
  .hero.active { background: #1b2a20; }
  .resources { margin-top: 8px; color: #ffd23a; }
  #combat-panel, #shop-panel, #cast-panel {
    background: #1a1010;
    border: 1px solid #4a2a2a;
    padding: 8px 10px;
    color: #ffdca8;
    font-size: 13px;
  }
  #overlay {
    grid-column: 1/3;
    background: #000;
    color: #ff5a5a;
    text-align: center;
    padding: 20px;
    font-size: 18px;
    border: 1px solid #4a2a2a;
  }
  #log {
    grid-column: 1 / 3;
    background: #05070a;
    border: 1px solid #2a3a44;
    color: #8fd3a0;
    padding: 6px 10px;
    height: 110px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 12px;
  }
  #help {
    grid-column: 1 / 3;
    font-size: 11px;
    color: #5a7a8a;
    text-align: center;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="app">
    <div id="title">THE FROSTHOLD DEPTHS</div>
    <div id="viewport-frame">
      <canvas id="view" width="640" height="420"></canvas>
      <canvas id="automap" width="300" height="300" class="hidden"></canvas>
    </div>
    <div id="roster"></div>
    <div id="hud">Frosthold Depths</div>
    <div id="combat-panel" class="hidden"></div>
    <div id="shop-panel" class="hidden"></div>
    <div id="cast-panel" class="hidden"></div>
    <div id="overlay" class="hidden"></div>
    <div id="log"></div>
    <div id="help">
      Move: Arrows/WASD &nbsp; Strafe: Q/E &nbsp; Interact/Search: Space/Enter &nbsp; Auto-map: M &nbsp; Cast: C &nbsp;
      Combat: 1 Attack &middot; 2 Cast &middot; 3 Block &middot; 4 Run, then a number to target
    </div>
  </div>
  <!-- dist/bundle.js is generated from src/*.js by tools/build-bundle.mjs — a
       classic (non-module) script so the game runs via file:// with no
       server, in any browser. Edit src/, then: node tools/build-bundle.mjs -->
  <script src="dist/bundle.js"></script>
</body>
</html>
